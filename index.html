<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flashcard study</title>
    <link rel="stylesheet" href="style.css">
    <script src="./dist/script.js" defer></script>
</head>
<body>
    <div class="cardLayoutRow">
        <h1 id="previousCard"> < </h1>
        <main class="gameContainer">
            <div class="card">
                <div class="cardFront">
                    <h3 class="cardFrontTitle">Question:</h3>
                    <p id="question">Test</p>
                </div>
                <div class="cardBack">
                    <h3 class="cardBackTitle">Answer:</h3>
                    <p id="answer">Test</p>
                </div>
            </div>
        </main>
        <h1 id="nextCard"> > </h1>
    </div>
    <form id="newCard">
        <div class="userInput">
            <input id="newCardQuestion" type="text" placeholder="New Card - Question" required>
            <input id="newCardAnswer" type="text" placeholder="New Card - Answer" required>
        </div>
        <div class="buttonsAddCard">
            <button id="addCardButton">Add Card</button>
        </div>
    </form>
    <div id="resetContainer">
        <button id="resetCardsButton">Reset Cards</button>
    </div>
</body>
</html>
